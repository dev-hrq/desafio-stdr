spring:
  application:
    name: cep-query-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cepdb}
    username: ${DB_USERNAME:cepuser}
    password: ${DB_PASSWORD:ceppassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

opencep:
  base-url: ${OPENCEP_BASE_URL:http://localhost:8081}
  connect-timeout: 2s
  read-timeout: 3s

## VERIFICAR
environment:
  OPENCEP_BASE_URL: http://wiremock:8080

ddl-auto: validate